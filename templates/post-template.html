<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$ | Nikhil Kumar</title>
$if(description)$
  <meta name="description" content="$description$">
$endif$
  <meta name="author" content="Nikhil Kumar">

  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="$title$">
$if(description)$
  <meta property="og:description" content="$description$">
$endif$
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0a0a'/%3E%3Ctext x='50%25' y='50%25' dy='.1em' font-family='Inter,Arial,sans-serif' font-size='30' font-weight='700' fill='%23e50914' text-anchor='middle' dominant-baseline='middle'%3ENK%3C/text%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #141414;
      --bg-card: #1a1a2e;
      --accent: #ffffff;
      --accent-muted: #b3b3b3;
      --accent-dim: #a1a1a6;
      --border: rgba(255, 255, 255, 0.08);
      --highlight: #e50914;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--accent);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    a { color: #6ea8fe; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 5%;
    }

    .top-nav a {
      color: var(--accent-muted);
      font-size: 0.9rem;
      font-weight: 500;
      margin-right: 2rem;
    }

    .top-nav a:hover { color: var(--accent); text-decoration: none; }

    .article-wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 4rem 5% 6rem;
    }

    .article-header { margin-bottom: 3rem; }

    .article-title {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -1.5px;
      line-height: 1.15;
      margin-bottom: 1.2rem;
    }

    .article-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      color: var(--accent-dim);
      font-size: 0.9rem;
    }

    .tag {
      display: inline-block;
      padding: 0.3rem 0.9rem;
      background: rgba(229, 9, 20, 0.15);
      border: 1px solid rgba(229, 9, 20, 0.3);
      border-radius: 50px;
      color: var(--highlight);
      font-size: 0.78rem;
      font-weight: 600;
    }

    #TOC {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      margin-bottom: 3rem;
    }

    #TOC::before {
      content: 'Contents';
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--highlight);
      margin-bottom: 1rem;
    }

    #TOC ul { list-style: none; }
    #TOC li { margin: 0.4rem 0; }
    #TOC a { color: var(--accent-muted); }
    #TOC ul ul { padding-left: 1.2rem; }

    .article-body h2 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin: 2.5rem 0 1rem;
      padding-top: 0.5rem;
    }

    .article-body h3 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 2rem 0 0.8rem;
    }

    .article-body p { color: #d4d4d8; margin-bottom: 1.3rem; }
    .article-body ul, .article-body ol { margin: 0 0 1.3rem 1.5rem; color: #d4d4d8; }
    .article-body li { margin-bottom: 0.5rem; }

    .article-body img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      margin: 1.5rem 0;
      border: 1px solid var(--border);
    }

    .article-body blockquote {
      border-left: 3px solid var(--highlight);
      padding-left: 1.2rem;
      margin: 1.5rem 0;
      color: var(--accent-muted);
      font-style: italic;
    }

    .article-body code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9em;
      background: rgba(255, 255, 255, 0.08);
      padding: 0.15em 0.4em;
      border-radius: 5px;
    }

    .article-body pre {
      background: #141414;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.3rem 1.5rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .article-body pre code {
      background: none;
      padding: 0;
      font-family: 'JetBrains Mono', monospace;
    }

    .article-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.95rem;
    }

    .article-body th, .article-body td {
      border: 1px solid var(--border);
      padding: 0.7rem 1rem;
      text-align: left;
    }

    .article-body th { background: var(--bg-card); }

    .article-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      color: var(--accent-dim);
      font-size: 0.9rem;
    }

    html { scroll-behavior: smooth; }

    @media (max-width: 640px) {
      .article-title { font-size: 2rem; }
    }
  </style>
</head>

<body>
  <nav class="top-nav">
    <a href="/">&larr; Portfolio</a>
    <a href="/blog/">All posts</a>
  </nav>

  <article class="article-wrap">
    <header class="article-header">
      <h1 class="article-title">$title$</h1>
      <div class="article-meta">
$if(date)$
        <span>$date$</span>
$endif$
$if(reading-time)$
        <span>&middot; $reading-time$ min read</span>
$endif$
$if(tags)$
$for(tags)$
        <span class="tag">$tags$</span>
$endfor$
$endif$
      </div>
    </header>

$if(toc)$
    <nav id="TOC" role="doc-toc">
    $table-of-contents$
    </nav>
$endif$

    <div class="article-body">
$body$
    </div>

    <footer class="article-footer">
      <p>Written by Nikhil Kumar &middot; <a href="/blog/">Back to all posts</a></p>
    </footer>
  </article>
</body>

</html>
